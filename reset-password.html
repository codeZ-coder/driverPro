<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>DriverPRO — Redefinir senha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0b;--panel:#111114;
  --seam:rgba(255,255,255,0.06);--seam2:rgba(255,255,255,0.12);
  --yellow:#f5c518;--yellow-dim:rgba(245,197,24,0.08);
  --lime:#a3e635;--red:#ef4444;
  --muted2:#9a9aa4;--text:#e8e6df;
  --fh:'Rajdhani',sans-serif;--fb:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--panel);border:1px solid var(--seam2);border-radius:14px;
  padding:32px 28px;width:100%;max-width:420px}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.brand .bar{width:36px;height:4px;border-radius:99px;background:var(--yellow)}
.brand span{font-family:var(--fh);font-weight:700;letter-spacing:3px;color:var(--yellow);font-size:14px}
h1{font-family:var(--fh);font-size:26px;line-height:1.15;margin-bottom:8px}
p.sub{color:var(--muted2);font-size:14px;margin-bottom:22px}
label{display:block;font-size:12px;letter-spacing:1px;color:var(--muted2);margin:14px 0 6px;text-transform:uppercase}
input{width:100%;background:var(--bg);border:1px solid var(--seam2);border-radius:10px;
  color:var(--text);font-size:16px;padding:12px 14px;font-family:var(--fb)}
input:focus{outline:none;border-color:var(--yellow)}
button{width:100%;margin-top:22px;background:var(--yellow);color:#111;border:0;border-radius:10px;
  padding:14px;font-size:16px;font-weight:700;font-family:var(--fb);cursor:pointer}
button:disabled{opacity:.55;cursor:default}
#msg{margin-top:16px;font-size:14px;line-height:1.5;display:none}
#msg.erro{display:block;color:var(--red)}
#msg.ok{display:block;color:var(--lime)}
.hint{margin-top:18px;font-size:12px;color:var(--muted2);line-height:1.5}
</style>
</head>
<body>
<main class="card">
  <div class="brand"><div class="bar"></div><span>DRIVERPRO</span></div>
  <h1>Criar nova senha</h1>
  <p class="sub">Escolha a nova senha da sua conta. Depois é só voltar ao app e entrar com ela.</p>
  <form id="form" novalidate>
    <label for="p1">Nova senha</label>
    <input id="p1" type="password" autocomplete="new-password" minlength="8" required>
    <label for="p2">Repita a nova senha</label>
    <input id="p2" type="password" autocomplete="new-password" minlength="8" required>
    <button id="btn" type="submit">Salvar nova senha</button>
  </form>
  <div id="msg" role="alert"></div>
  <p class="hint">Dica: use pelo menos 8 caracteres, misturando letras e números.
    Se este link expirou, peça um novo em "Esqueci minha senha" no app.</p>
</main>
<script>
(function(){
  var API = "https://api.driver-pro.com.br/api/v1/auth/password-reset/confirm/";
  var q = new URLSearchParams(location.search);
  var uid = q.get("uid"), token = q.get("token");
  var form = document.getElementById("form");
  var msg = document.getElementById("msg");
  var btn = document.getElementById("btn");

  function show(text, ok){
    msg.textContent = text;
    msg.className = ok ? "ok" : "erro";
  }

  if (!uid || !token) {
    form.style.display = "none";
    show("Link inválido ou incompleto. Abra o e-mail de redefinição e toque no link de novo — ou peça um novo em \"Esqueci minha senha\" no app.", false);
    return;
  }

  form.addEventListener("submit", function(ev){
    ev.preventDefault();
    var p1 = document.getElementById("p1").value;
    var p2 = document.getElementById("p2").value;
    if (p1.length < 8) { show("A senha precisa ter pelo menos 8 caracteres.", false); return; }
    if (p1 !== p2) { show("As duas senhas não são iguais.", false); return; }

    btn.disabled = true;
    btn.textContent = "Salvando...";
    fetch(API, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({uid: uid, token: token, new_password: p1})
    }).then(function(r){
      return r.json().then(function(data){ return {ok: r.ok, data: data}; });
    }).then(function(res){
      if (res.ok) {
        form.style.display = "none";
        show("Senha atualizada! Abra o app DriverPRO e entre com a nova senha.", true);
      } else {
        var erro = res.data && (res.data.detail ||
          (res.data.new_password && res.data.new_password.join(" ")));
        show(erro || "Não foi possível atualizar a senha. Tente novamente.", false);
        btn.disabled = false;
        btn.textContent = "Salvar nova senha";
      }
    }).catch(function(){
      show("Falha de conexão. Verifique sua internet e tente de novo.", false);
      btn.disabled = false;
      btn.textContent = "Salvar nova senha";
    });
  });
})();
</script>
</body>
</html>
